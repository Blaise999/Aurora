<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200">
  <defs>
    <linearGradient id="c11bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080412"/><stop offset="100%" stop-color="#0c0a1e"/>
    </linearGradient>
    <linearGradient id="c11g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/><stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="c11g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.8"/><stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="c11r" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.15"/><stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="c11glow"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="c11ns">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
  </defs>
  <rect width="900" height="1200" fill="url(#c11bg)"/>
  <rect width="900" height="1200" fill="url(#c11r)"/>
  <!-- Central crystal -->
  <g transform="translate(450,520)">
    <polygon points="0,-200 120,-60 80,160 -80,160 -120,-60" fill="url(#c11g2)" opacity="0.2"/>
    <polygon points="0,-200 120,-60 80,160 -80,160 -120,-60" fill="none" stroke="url(#c11g1)" stroke-width="2"/>
    <polygon points="0,-200 120,-60 80,160 -80,160 -120,-60" fill="none" stroke="#00E5FF" stroke-width="1" filter="url(#c11glow)" opacity="0.5"/>
    <line x1="0" y1="-200" x2="80" y2="160" stroke="#00E5FF" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="-200" x2="-80" y2="160" stroke="#8B5CF6" stroke-width="0.5" opacity="0.3"/>
    <line x1="-120" y1="-60" x2="80" y2="160" stroke="#06B6D4" stroke-width="0.3" opacity="0.2"/>
    <line x1="120" y1="-60" x2="-80" y2="160" stroke="#06B6D4" stroke-width="0.3" opacity="0.2"/>
    <!-- Inner facets -->
    <polygon points="0,-120 60,-20 40,100 -40,100 -60,-20" fill="none" stroke="#00E5FF" stroke-width="0.8" opacity="0.4"/>
    <circle r="8" fill="#00E5FF" opacity="0.6" filter="url(#c11glow)"/>
  </g>
  <!-- Orbiting particles -->
  <g fill="#00E5FF">
    <circle cx="280" cy="350" r="3" opacity="0.7" filter="url(#c11glow)"/>
    <circle cx="620" cy="400" r="2.5" opacity="0.6" filter="url(#c11glow)"/>
    <circle cx="350" cy="750" r="2" opacity="0.5" filter="url(#c11glow)"/>
    <circle cx="550" cy="300" r="1.5" opacity="0.4"/>
  </g>
  <g fill="#8B5CF6">
    <circle cx="330" cy="500" r="2" opacity="0.5" filter="url(#c11glow)"/>
    <circle cx="580" cy="650" r="2.5" opacity="0.4" filter="url(#c11glow)"/>
  </g>
  <!-- Scattered stars -->
  <g fill="#fff" opacity="0.4">
    <circle cx="120" cy="100" r="1"/><circle cx="780" cy="150" r="1.2"/><circle cx="200" cy="900" r="1"/>
    <circle cx="700" cy="1000" r="0.8"/><circle cx="450" cy="1100" r="1"/>
  </g>
  <rect width="900" height="1200" filter="url(#c11ns)" opacity="0.4"/>
</svg>
