<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200">
  <defs>
    <linearGradient id="c31bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/><stop offset="100%" stop-color="#0a0e20"/>
    </linearGradient>
    <linearGradient id="c31tri" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.5"/><stop offset="50%" stop-color="#06B6D4" stop-opacity="0.3"/><stop offset="100%" stop-color="#00E5FF" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="c31r" cx="50%" cy="42%" r="40%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.12"/><stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="c31glow"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="c31ns">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.04"/></feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
  </defs>
  <rect width="900" height="1200" fill="url(#c31bg)"/>
  <rect width="900" height="1200" fill="url(#c31r)"/>
  <!-- Triangular prism -->
  <g transform="translate(450,520)">
    <polygon points="0,-220 200,130 -200,130" fill="url(#c31tri)" opacity="0.15"/>
    <polygon points="0,-220 200,130 -200,130" fill="none" stroke="#10B981" stroke-width="2"/>
    <polygon points="0,-220 200,130 -200,130" fill="none" stroke="#10B981" stroke-width="3" opacity="0.15" filter="url(#c31glow)"/>
    <!-- Inner triangles -->
    <polygon points="0,-130 120,80 -120,80" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.4"/>
    <polygon points="0,-60 60,40 -60,40" fill="none" stroke="#00E5FF" stroke-width="0.8" opacity="0.5"/>
    <!-- Medians -->
    <line x1="0" y1="-220" x2="0" y2="130" stroke="#10B981" stroke-width="0.4" opacity="0.2"/>
    <line x1="-200" y1="130" x2="100" y2="-45" stroke="#06B6D4" stroke-width="0.3" opacity="0.15"/>
    <line x1="200" y1="130" x2="-100" y2="-45" stroke="#06B6D4" stroke-width="0.3" opacity="0.15"/>
    <!-- Center -->
    <circle r="8" fill="#10B981" opacity="0.5" filter="url(#c31glow)"/>
    <circle r="3" fill="#fff" opacity="0.9"/>
  </g>
  <!-- Light refraction rays -->
  <g opacity="0.06" stroke-width="0.5">
    <line x1="450" y1="300" x2="250" y2="150" stroke="#10B981"/><line x1="450" y1="300" x2="650" y2="150" stroke="#06B6D4"/>
    <line x1="250" y1="650" x2="100" y2="850" stroke="#10B981"/><line x1="650" y1="650" x2="800" y2="850" stroke="#06B6D4"/>
  </g>
  <g fill="#10B981"><circle cx="350" cy="380" r="2.5" opacity="0.5" filter="url(#c31glow)"/><circle cx="550" cy="620" r="2" opacity="0.4"/></g>
  <g fill="#06B6D4"><circle cx="530" cy="400" r="2" opacity="0.4" filter="url(#c31glow)"/><circle cx="370" cy="650" r="2.5" opacity="0.5"/></g>
  <g fill="#fff" opacity="0.35"><circle cx="100" cy="70" r="1.2"/><circle cx="800" cy="100" r="1"/><circle cx="120" cy="1100" r="1"/><circle cx="780" cy="1080" r="1.2"/></g>
  <rect width="900" height="1200" filter="url(#c31ns)" opacity="0.4"/>
</svg>
