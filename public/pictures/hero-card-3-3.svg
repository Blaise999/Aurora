<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200">
  <defs>
    <linearGradient id="c33bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05080e"/><stop offset="100%" stop-color="#080c1a"/>
    </linearGradient>
    <radialGradient id="c33r" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.1"/><stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="c33glow"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="c33ns">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.04"/></feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
  </defs>
  <rect width="900" height="1200" fill="url(#c33bg)"/>
  <rect width="900" height="1200" fill="url(#c33r)"/>
  <!-- Cascading isometric blocks -->
  <g transform="translate(450,400)" fill="none" opacity="0.15">
    <!-- Top block -->
    <g stroke="#00E5FF" stroke-width="1.2">
      <polygon points="0,-80 80,-40 0,0 -80,-40"/>
      <polygon points="80,-40 80,0 0,40 0,0"/>
      <polygon points="-80,-40 -80,0 0,40 0,0"/>
    </g>
    <!-- Middle blocks -->
    <g transform="translate(-80,40)" stroke="#06B6D4" stroke-width="1">
      <polygon points="0,-80 80,-40 0,0 -80,-40"/>
      <polygon points="80,-40 80,0 0,40 0,0"/>
      <polygon points="-80,-40 -80,0 0,40 0,0"/>
    </g>
    <g transform="translate(80,40)" stroke="#10B981" stroke-width="1">
      <polygon points="0,-80 80,-40 0,0 -80,-40"/>
      <polygon points="80,-40 80,0 0,40 0,0"/>
      <polygon points="-80,-40 -80,0 0,40 0,0"/>
    </g>
    <!-- Bottom blocks -->
    <g transform="translate(-160,80)" stroke="#00E5FF" stroke-width="0.8" opacity="0.7">
      <polygon points="0,-80 80,-40 0,0 -80,-40"/>
      <polygon points="80,-40 80,0 0,40 0,0"/>
    </g>
    <g transform="translate(0,80)" stroke="#8B5CF6" stroke-width="1">
      <polygon points="0,-80 80,-40 0,0 -80,-40"/>
      <polygon points="80,-40 80,0 0,40 0,0"/>
      <polygon points="-80,-40 -80,0 0,40 0,0"/>
    </g>
    <g transform="translate(160,80)" stroke="#06B6D4" stroke-width="0.8" opacity="0.7">
      <polygon points="0,-80 80,-40 0,0 -80,-40"/>
      <polygon points="-80,-40 -80,0 0,40 0,0"/>
    </g>
    <!-- Deeper row -->
    <g transform="translate(-80,120)" stroke="#00E5FF" stroke-width="0.6" opacity="0.5">
      <polygon points="0,-80 80,-40 0,0 -80,-40"/>
    </g>
    <g transform="translate(80,120)" stroke="#10B981" stroke-width="0.6" opacity="0.5">
      <polygon points="0,-80 80,-40 0,0 -80,-40"/>
    </g>
  </g>
  <!-- Glow effects on blocks -->
  <g transform="translate(450,400)" opacity="0.08">
    <polygon points="0,-80 80,-40 0,0 -80,-40" fill="none" stroke="#00E5FF" stroke-width="3" filter="url(#c33glow)"/>
    <polygon points="-80,-40 0,0 80,-40 0,80 -80,0 0,40 80,0 0,-40" fill="none" stroke="#8B5CF6" stroke-width="2" filter="url(#c33glow)" transform="translate(0,120)"/>
  </g>
  <!-- Floating particles -->
  <g fill="#00E5FF"><circle cx="320" cy="350" r="2.5" opacity="0.5" filter="url(#c33glow)"/><circle cx="580" cy="500" r="2" opacity="0.4"/></g>
  <g fill="#10B981"><circle cx="400" cy="600" r="2" opacity="0.4" filter="url(#c33glow)"/><circle cx="500" cy="350" r="1.5" opacity="0.5"/></g>
  <!-- Falling data lines below blocks -->
  <g opacity="0.06" stroke-dasharray="3,8" stroke-width="0.8">
    <line x1="370" y1="600" x2="370" y2="1000" stroke="#00E5FF"/><line x1="450" y1="650" x2="450" y2="1050" stroke="#8B5CF6"/>
    <line x1="530" y1="600" x2="530" y2="1000" stroke="#06B6D4"/>
  </g>
  <g fill="#fff" opacity="0.35"><circle cx="100" cy="80" r="1"/><circle cx="800" cy="100" r="1.2"/><circle cx="120" cy="1100" r="1"/><circle cx="780" cy="1080" r="1"/></g>
  <rect width="900" height="1200" filter="url(#c33ns)" opacity="0.4"/>
</svg>
